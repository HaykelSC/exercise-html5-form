<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="//maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" rel="stylesheet" id="bootstrap-css">
        <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.8.1/css/all.css" integrity="sha384-50oBUHEmvpQ+1lW4y57PTFmhCaXp0ML5d60M1M7uH2+nqUivzIebhndOJK28anvf" crossorigin="anonymous">
        <script src="//maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>
        <script src="//cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
        <link rel= "stylesheet" href="Styles.CSS">
</head>
<body>
            <!-- Header-->
            <div class="header" style="border-style: groove; border-radius: 5px; width: 80%;
    margin: 50px 25px 50px 100px;
    border-style: groove;">
            <h3>Payment for example</h3>
            </div>
            
            <!-- Forms Body-->
            <form class="form" role="form" autocomplete="off" style="border-style: groove; border-radius: 5px; width: 80%;
    margin: -52px 25px 50px 100px;
    border-style: groove; padding: 5px 10px 0px 10px;">
            <!-- Alert-->
            <div class="alert alert-info p-2 pb-3" style="height: 40px";>
                <a class="close font-weight-normal initialism" data-dismiss="alert" href="#"><samp>×</samp></a> 
                Some fields are missing
            </div>
                <!-- Credit information-->
                <div class="form-row">
                    <div class="form-group col-md-4">
                        <label>Card#</label>
                        <input type="number" class="form-control" autocomplete="off" maxlength="20" pattern="\d{16}" title="Credit card number" required="">
                    </div>
                    <div class="form-group col-md-4">
                        <label>CVC #</label>                                
                        <input type="text" class="form-control" autocomplete="off" maxlength="3" pattern="\d{3}" title="Three digits at back of your card" required="" placeholder="CVC">
                    </div>
                    <div class="form-group col-md-4">
                        <label>Amount</label>
                        <input type="number" class="form-control" autocomplete="off" maxlength="20" pattern="\d{16}" title="amount of money yoy want to transfer" required="" placeholder="Amount">
                    </div>
                </div>
                <!-- Credit information ended-->
                <!-- Personal information-->
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label for="cc_name">First Name</label>
                        <input type="text" class="form-control" id="cc_name" pattern="\w+ \w+.*" title="First name" required="required">
                    </div>
                    <div class="form-group col-md-6">
                        <label for="cc_lastname">Last Name</label>
                        <input type="text" class="form-control" id="cc_name" pattern="\w+ \w+.*" title="Last name" required="required">
                    </div>
                </div>
                <!-- Personal information ended-->
                
                <!-- Location-->
                <div class="form-row">
                    <div class="form-group col-md-4">
                        <label for="City">City</label>
                        <input type="text" class="form-control" id="cc_name" pattern="\w+ \w+.*" title="City" required="required">
                    </div>
                    <div class="form-group col-md-4">
                        <label for="State">State</label>
                        <br>
                        <select class="form-select form-group col-mb-4" aria-label=".form-select-mb example" style="width: 100%; height:50%;">
                            <option selected>Pick a state</option>
                            <option value="1">New York</option>
                            <option value="2">California</option>
                            <option value="3">Miami</option>
                        </select> 
                        </div>
                    <div class="form-group col-md-4">
                        <label for="Postal">Postal Code</label>
                        <input type="text" class="form-control" id="cc_name" pattern="\w+ \w+.*" title="City" required="required">
                    </div>
                </div>
                <!-- Location ended-->
                <!-- Other information-->
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label for="Credit card">We accept</label>
                        <br>
                        <div class="imag-credit ">
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio1" value="option1">
                                <label class="form-check-label" for="inlineRadio1"><i class="fab fa-cc-visa"></i></label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio2" value="option2">
                                <label class="form-check-label" for="inlineRadio2"><i class="fab fa-cc-amex"></i></label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio3" value="option3">
                                <label class="form-check-label" for="inlineRadio3"><i class="fab fa-cc-mastercard"></i></label>
                            </div>
                        </div>
                    </div>
                    <div class="form-group col-md-6">
                        <label for="City">Message</label>
                        <input type="text" class="form-control" id="cc_name" pattern="\w+ \w+.*" title="Message" style="height: 100px"> 
                        <label style="font-size: smaller;">add any notes here.</label>
                    </div>
                </div>   
                <!-- Other information ended-->
            </form>
            <!--Footer-->
            <div class="footer" style="border-style: groove; border-radius: 5px; width: 80%; margin: -52px 25px 50px 100px;border-style: groove; padding: 7px;">
                <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                    <button type="reset"  class="btn btn-primary me-md-2" type="button" style="margin-right: 7px;">Cancel</button>
                    <button type="submit" class="btn btn-primary me-md-2" type="button">Send</button>
                </div>
            </div>
</body>
</html>
